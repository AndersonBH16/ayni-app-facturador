services:
  postgres:
    build:
      context: ./docker/postgres
    container_name: ayni-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-ayni_facturador}
      POSTGRES_USER: ${DB_USERNAME:-ayni}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - ayni_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-ayni} -d ${DB_DATABASE:-ayni_facturador}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ayni-pgadmin
    restart: unless-stopped
    environment:
        PGADMIN_DEFAULT_EMAIL: admin@ayni.dev
        PGADMIN_DEFAULT_PASSWORD: secret
    ports:
        - "5050:80"
    depends_on:
        - postgres

volumes:
  ayni_postgres_data:
